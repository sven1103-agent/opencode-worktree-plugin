name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Install OpenCode CLI
        run: npm install -g opencode-linux-x64@1.3.7

      - name: Run smoke test
        env:
          OPENCODE_BIN: opencode
        run: npm run test:smoke
