name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Validate tag matches package version
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($RELEASE_TAG) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish

      - name: Prepare release summary
        run: |
          VERSION="${RELEASE_TAG#v}"
          cat <<EOF > "$RUNNER_TEMP/release-notes.md"
          ## Release Contents

          - npm package: \`@sven1103/opencode-worktree-workflow@${VERSION}\`
          - slash command assets: \`wt-new.md\`, \`wt-clean.md\`
          - skill asset: \`worktree-workflow.md\`
          - transparency guide: \`docs/releases.md\`

          ## Install

          - npm: \`npm install @sven1103/opencode-worktree-workflow\`
          - commands: download the attached \`wt-new.md\` and \`wt-clean.md\` files into your OpenCode commands directory
          - skill: download the attached \`worktree-workflow.md\` file into the skill location used by your environment

          ## Verification

          - compare this release tag with \`package.json\`
          - inspect the attached markdown files before installing them
          - see \`docs/releases.md\` for the full release and verification guide
          EOF

      - name: Create GitHub Release (if missing)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: ${{ runner.temp }}/release-notes.md
          generate_release_notes: true
          files: |
            commands/wt-new.md
            commands/wt-clean.md
            skills/worktree-workflow.md
